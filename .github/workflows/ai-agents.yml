name: AI-агенты (целостность governance + рельсы безопасности)

# Этап 6. Служебные AI-агенты (Конституция, ст. 9) на каждый push/PR:
#  • Audit — целостность всего governance-слоя (реестр hash-chain, IPFS-манифест,
#    конфиги Safe/Snapshot), каждая проверка привязана к статье конституции;
#  • Guardian — рельсы безопасности по всему репо (нет ключей/секретов/mainnet);
#    его тест-инвариант доказывает, что красное реально ловится;
#  • Fairness — справедливость распределения по PRIORITIES.md/ANTI-ABUSE.md
#    (приоритет, лимиты, коллективная проверка, поэтапность, приватность);
#    его тест-инвариант доказывает, что красное реально ловится.
#  • Reputation — модель «1 человек = 1 голос» в коде Reputation.sol и в
#    настройках Snapshot (soulbound, вес [1..1+cap], роли, не плутократия);
#    его тест-инвариант доказывает, что красное реально ловится.
#  • Housing — целевой escrow жилищной помощи в коде Disbursement.sol и в записях
#    реестра (транш только поставщику, refund в казну, потолок транша, приоритет);
#    его тест-инвариант доказывает, что красное реально ловится.
#  • Documentation — двуязычность RU↔EN (у каждого публичного дока есть пара и
#    переключатель языка) + целостность относительных ссылок во всех .md;
#    его тест-инвариант доказывает, что красное реально ловится.
#  • Governance — жизненный цикл предложения в конфигах управления (Snapshot
#    space.json + Safe safe.config.json): «1 человек = 1 голос» (ticket value=1,
#    не плутократия), ограниченный срок голосования, off-chain сигнал не исполняет
#    сам, привязка типов про деньги/конституцию к PRIORITIES/ANTI-ABUSE/CONSTITUTION,
#    мультисиг 3-из-5 (никто единолично); НЕ голосует. Тест-инвариант доказывает,
#    что красное реально ловится.
#  • Mediator — процесс споров/апелляций (governance/mediation/dispute-process.json):
#    у каждой санкции ANTI-ABUSE есть путь обжалования, спор решают ЛЮДИ (≥2), не
#    ИИ/один; апелляцию рассматривает не автор санкции; корректный жизненный цикл
#    (старт/терминал/без тупиков), конечные сроки; СТРУКТУРИРУЕТ, НЕ решает.
#    Тест-инвариант доказывает, что красное реально ловится.
# Любое нарушение целостности/рельс/справедливости/модели голоса/escrow/документации/управления/апелляций валит сборку.
# Read-only: агенты ничего не двигают и ничем не владеют.
on:
  push:
    paths:
      - "ai-agents/**"
      - "scripts/registry.py"
      - "scripts/ipfs_manifest.py"
      - "scripts/safe_config.py"
      - "scripts/snapshot_config.py"
      - "contracts/contracts/**"
      - "docs/PRIORITIES.md"
      - "governance/**"
      - "**/*.md"
      - "*.md"
      - ".github/workflows/ai-agents.yml"
  pull_request:
    paths:
      - "ai-agents/**"
      - "scripts/registry.py"
      - "scripts/ipfs_manifest.py"
      - "scripts/safe_config.py"
      - "scripts/snapshot_config.py"
      - "contracts/contracts/**"
      - "docs/PRIORITIES.md"
      - "governance/**"
      - "**/*.md"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Прогнать Audit-агента (governance-целостность)
        run: python3 ai-agents/audit_agent.py
      - name: Тест-инвариант Guardian (доказать, что красное ловится)
        run: python3 ai-agents/test_guardian.py
      - name: Прогнать Guardian-агента (рельсы безопасности по всему репо)
        run: python3 ai-agents/guardian_agent.py
      - name: Тест-инвариант Fairness (доказать, что красное ловится)
        run: python3 ai-agents/test_fairness.py
      - name: Прогнать Fairness-агента (справедливость распределения)
        run: python3 ai-agents/fairness_agent.py
      - name: Тест-инвариант Reputation (доказать, что красное ловится)
        run: python3 ai-agents/test_reputation.py
      - name: Прогнать Reputation-агента (модель «1 человек = 1 голос»)
        run: python3 ai-agents/reputation_agent.py
      - name: Тест-инвариант Housing (доказать, что красное ловится)
        run: python3 ai-agents/test_housing.py
      - name: Прогнать Housing-агента (целевой escrow жилищной помощи)
        run: python3 ai-agents/housing_agent.py
      - name: Тест-инвариант Documentation (доказать, что красное ловится)
        run: python3 ai-agents/test_documentation.py
      - name: Прогнать Documentation-агента (двуязычность RU↔EN + ссылки)
        run: python3 ai-agents/documentation_agent.py
      - name: Тест-инвариант Governance (доказать, что красное ловится)
        run: python3 ai-agents/test_governance.py
      - name: Прогнать Governance-агента (жизненный цикл предложения, не голосует)
        run: python3 ai-agents/governance_agent.py
      - name: Тест-инвариант Mediator (доказать, что красное ловится)
        run: python3 ai-agents/test_mediator.py
      - name: Прогнать Mediator-агента (процесс споров/апелляций, не решает)
        run: python3 ai-agents/mediator_agent.py
