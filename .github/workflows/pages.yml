name: Deploy public site to GitHub Pages

# Деплоит статический сайт из /web в GitHub Pages.
# Источник Pages в настройках репозитория должен быть выставлен на "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions) — это
# единоразовое действие оператора, см. PROGRESS.md → «НУЖНО ОТ ОПЕРАТОРА».

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; новые пуши отменяют незавершённые прогоны.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact (web/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
